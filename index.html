<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cafe — Ordering System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="coffee.css">
</head>
<body>

<header class="site-header">
  <div class="brand">
    <span class="brand-mark">☕</span>
    <div class="brand-text">
      <h1>The Cafe</h1>
      <p>menu for today</p>
    </div>
  </div>
  <div class="header-clock" id="headerClock"></div>
</header>

<main class="layout">

  <!-- LEFT: menu -->
  <section class="menu-panel">
    <nav class="category-tabs" id="categoryTabs">
      <button class="tab" data-cat="Iced">Iced</button>
      <button class="tab" data-cat="Hot">Hot</button>
      <button class="tab" data-cat="Toast">Toast</button>
      <button class="tab" data-cat="Dessert">Dessert</button>
    </nav>

    <div class="item-grid" id="itemGrid"></div>
  </section>

  <!-- RIGHT: cart / receipt -->
  <aside class="cart-panel">
    <div class="receipt">
      <div class="receipt-head">
        <h2>Your Order</h2>
        <span class="perforation" aria-hidden="true"></span>
      </div>

      <ul class="cart-list" id="cartList">
        <li class="cart-empty" id="cartEmpty">Nothing ordered yet — pick something tasty.</li>
      </ul>

      <div class="receipt-totals">
        <div class="totals-row"><span>Subtotal</span><span id="subtotalVal">$0.00</span></div>
        <div class="totals-row"><span>Tax (7%)</span><span id="taxVal">$0.00</span></div>
        <div class="totals-row totals-final"><span>Total</span><span id="totalVal">$0.00</span></div>
      </div>

      <div class="cart-actions">
        <button class="btn btn-ghost" id="removeBtn">Remove Selected</button>
        <button class="btn btn-primary" id="checkoutBtn">Checkout</button>
      </div>
    </div>
  </aside>

</main>

<!-- Item customization dialog -->
<div class="modal-backdrop" id="itemModalBackdrop">
  <div class="modal" id="itemModal" role="dialog" aria-modal="true" aria-labelledby="modalItemName">
    <h3 id="modalItemName">Item</h3>

    <div class="modal-section" id="sizeSection">
      <p class="modal-label">Size</p>
      <div class="size-options" id="sizeOptions"></div>
    </div>

    <div class="modal-section" id="sugarSection">
      <p class="modal-label">Sugar level: <span id="sugarValue">50%</span></p>
      <input type="range" id="sugarSlider" min="0" max="100" step="25" value="50">
    </div>

    <div class="modal-section" id="noSizeSection">
      <p class="modal-label">Price</p>
      <p class="single-price" id="singlePrice">$0.00</p>
    </div>

    <div class="modal-section">
      <p class="modal-label">Quantity</p>
      <div class="qty-control">
        <button type="button" id="qtyMinus" aria-label="Decrease quantity">−</button>
        <input type="number" id="qtyInput" min="1" max="20" value="1" inputmode="numeric">
        <button type="button" id="qtyPlus" aria-label="Increase quantity">+</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="addToCartBtn">Add to Cart</button>
    </div>
  </div>
</div>

<!-- Receipt / checkout dialog -->
<div class="modal-backdrop" id="receiptModalBackdrop">
  <div class="modal receipt-modal" role="dialog" aria-modal="true" aria-labelledby="receiptTitle">
    <h3 id="receiptTitle">Receipt</h3>
    <pre class="receipt-text" id="receiptText"></pre>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="saveReceiptBtn">Save to File</button>
      <button class="btn btn-primary" id="closeReceiptBtn">Ok</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="coffee.js"></script>
</body>
</html>
